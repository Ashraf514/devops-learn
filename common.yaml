apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumen-project
spec: 
  replicas: 2
  selector: 
    matchLabels: 
      app: lumenProjectL
  template:
    metadata:
      labels:
        app: lumenProjectL
    spec: 
      containers:
      - name: lumen-project
        image: ashraf514/lumen-demo:latest
        env:
          - name: APP_ENV
            value: "production"
          - name: LOG_CHANNEL
            value: "database"
          - name: DB_PASSWORD
            value: "abc@123"
        ports:
        - containerPort: 8001
---
apiVersion: v1
# Service for exposing the Lumen application
kind: Service
metadata:
  # service name
  name: lumen-project-service
spec:
  selector:
    # Match pods labled app=lumenProjectL in app.yaml
    app: lumenProjectL
  #type of service to run in the browser
  type: NodePort
  ports:
  - port: 8001
    targetPort: 8001
    nodePort: 32000