name: Basic Laravel App
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHP Unit tests
        run: vendor/bin/phpunit

      - name: Build Docker Image
        run: docker build -t lumen-app:${{ github.sha }} .
      
      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Re-tag Docker Image
        run: docker tag lumen-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/lumen-app:${{ github.sha }}

      - name: Push Docker Image
        run: docker push  ${{ secrets.DOCKER_USERNAME }}/lumen-app:${{ github.sha }}
  deployment:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name lumen-prod \
            --region ap-south-1

      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic secret-vars \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy ConfigMap
        run: |
          kubectl apply -f config.yaml
        
      - name: Deploy kubernetes
        run: |
          kubectl apply -f common.yaml
          kubectl set image deployment/lumen-project \
          lumen-project=${{ secrets.DOCKER_USERNAME }}/lumen-app:${{ github.sha }}


      